<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math World - Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"> Math World</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="calculator.html" class="active">Calculator</a></li>
                <li><a href="diameter.html">Diameter</a></li>
                <li><a href="area.html">Area</a></li>
                <li><a href="volume.html">Volume</a></li>
                <li><a href="perimeter.html">Perimeter</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Scientific Calculator</h2>
        <div class="sci-calc">
            <input type="text" id="calc-screen" readonly>
            <div class="calc-buttons">
                <button class="btn-clear" onclick="clearScreen()">C</button>
                <button class="btn-operator" onclick="appendValue('(')">(</button>
                <button class="btn-operator" onclick="appendValue(')')">)</button>
                <button class="btn-operator" onclick="appendValue('%')">%</button>
                
                <button class="btn-operator" onclick="calcSpec('sqrt')">√</button>
                <button class="btn-operator" onclick="calcSpec('sq')">x²</button>
                <button class="btn-operator" onclick="appendValue('/')">/</button>
                <button class="btn-operator" onclick="appendValue('*')">×</button>

                <button class="btn-num" onclick="appendValue('7')">7</button>
                <button class="btn-num" onclick="appendValue('8')">8</button>
                <button class="btn-num" onclick="appendValue('9')">9</button>
                <button class="btn-operator" onclick="appendValue('-')">-</button>

                <button class="btn-num" onclick="appendValue('4')">4</button>
                <button class="btn-num" onclick="appendValue('5')">5</button>
                <button class="btn-num" onclick="appendValue('6')">6</button>
                <button class="btn-operator" onclick="appendValue('+')">+</button>

                <button class="btn-num" onclick="appendValue('1')">1</button>
                <button class="btn-num" onclick="appendValue('2')">2</button>
                <button class="btn-num" onclick="appendValue('3')">3</button>
                <button class="btn-equal" onclick="calculateResult()">=</button>

                <button class="btn-num" style="grid-column: span 2" onclick="appendValue('0')">0</button>
                <button class="btn-num" onclick="appendValue('.')">.</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
